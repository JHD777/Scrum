<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRUM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        /* Container para el iframe */
        .presenter-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100vh;
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* El iframe */
        #presentador {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px;
            height: 720px;
            transform-origin: top left;
            border: none;
            transition: opacity 0.3s;
            background: #0a0e1a;
        }
        
        /* Clase para modo pantalla completa (manual) */
        #presentador.fullscreen-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            transform: none !important;
            z-index: 9998;
        }
        
        .presenter-container.fullscreen-active {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9997;
        }
        
        /* Mensaje para rotar el teléfono */
        .rotate-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e1a;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .rotate-message i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #00d4ff;
        }
        
        .rotate-message p {
            font-size: 18px;
            opacity: 0.8;
        }
        
        /* Mostrar mensaje solo en móvil vertical */
        @media screen and (max-width: 768px) and (orientation: portrait) {
            .rotate-message {
                display: flex;
            }
            .presenter-container {
                display: none;
            }
            /* En vertical, también ocultar los controles */
            .controls {
                display: none !important;
            }
        }
        
        /* En móvil horizontal mostrar controles */
        @media screen and (max-width: 768px) and (orientation: landscape) {
            .controls {
                display: flex !important;
            }
        }
        
        /* Mensaje de ayuda para pantalla completa */
        .fullscreen-hint {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 1000;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 500;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }
        
        /* Ocultar hint en móvil */
        @media screen and (max-width: 768px) {
            .fullscreen-hint {
                display: none;
            }
        }
        
        /* Estilos para botones */
        .controls {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 99999 !important;
            display: flex !important;
            gap: 8px;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .controls button {
            background: rgba(128, 0, 128, 0.8);
            color: white;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .controls button:hover {
            background: rgba(128, 0, 128, 1);
        }
        
        .controls #num {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        
        /* Botones más grandes en móvil */
        @media screen and (max-width: 768px) {
            .controls {
                bottom: 15px;
                right: 15px;
                padding: 10px 12px;
                gap: 8px;
                background: rgba(0, 0, 0, 0.9);
            }
            
            .controls button {
                padding: 10px 16px;
                font-size: 16px;
            }
            
            .controls #num {
                font-size: 14px;
            }
        }
        
        /* Modo pantalla completa */
        :fullscreen .presenter-container,
        :-webkit-full-screen .presenter-container,
        :-moz-full-screen .presenter-container {
            background: #000;
        }

        :fullscreen #presentador,
        :-webkit-full-screen #presentador,
        :-moz-full-screen #presentador {
            transform: none !important;
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            position: fixed !important;
        }

        :fullscreen .controls,
        :-webkit-full-screen .controls,
        :-moz-full-screen .controls {
            opacity: 0.3;
        }

        :fullscreen .controls:hover,
        :-webkit-full-screen .controls:hover,
        :-moz-full-screen .controls:hover {
            opacity: 1;
        }
    </style>
    <!-- Font Awesome para icono de rotación -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Mensaje para rotar el teléfono -->
    <div class="rotate-message">
        <i class="fas fa-mobile-alt"></i>
        <p>Por favor, rota tu dispositivo<br>para ver la presentación</p>
    </div>

    <div class="presenter-container" id="contenedor">
        <iframe id="presentador" src="diapositivas/p1.html"></iframe>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="cambiar(-1)">◀</button>
        <button class="nav-btn" onclick="cambiar(1)">▶</button>
        <span id="num">1/14</span>
    </div>
    
    <!-- Mensaje de ayuda para pantalla completa -->
    <div class="fullscreen-hint">Presiona F para pantalla completa</div>

    <script>
        let actual = 1;
        const total = 14;
        const iframe = document.getElementById('presentador');
        const contenedor = document.getElementById('contenedor');
        const numTxt = document.getElementById('num');
        
        const anchoBase = 1280;
        const altoBase = 720;
        
        // Función de redimensionamiento
        function ajustarEscala() {
            // Verificar si estamos en pantalla completa
            const isFullscreen = document.fullscreenElement || 
                               document.webkitFullscreenElement || 
                               document.mozFullScreenElement ||
                               document.msFullscreenElement;
            
            const anchoVentana = window.innerWidth;
            const altoVentana = window.innerHeight;
            
            // Calcular la escala basada en el tamaño de la ventana vs el tamaño base
            const escalaX = anchoVentana / anchoBase;
            const escalaY = altoVentana / altoBase;
            const escala = Math.min(escalaX, escalaY);
            
            if (isFullscreen) {
                // En pantalla completa: usar scale en el iframe para que el contenido quepa
                iframe.classList.add('fullscreen-mode');
                contenedor.classList.add('fullscreen-active');
                
                // En lugar de 100vw/100vh, usamos scale para que el contenido de 1280x720 quepa
                iframe.style.position = 'fixed';
                iframe.style.left = '0';
                iframe.style.top = '0';
                iframe.style.width = anchoBase + 'px';
                iframe.style.height = altoBase + 'px';
                iframe.style.transform = 'scale(' + escala + ')';
                iframe.style.transformOrigin = 'top left';
                iframe.style.zIndex = '9998';
                
                contenedor.style.position = 'fixed';
                contenedor.style.top = '0';
                contenedor.style.left = '0';
                contenedor.style.width = (anchoBase * escala) + 'px';
                contenedor.style.height = (altoBase * escala) + 'px';
                contenedor.style.zIndex = '9997';
            } else {
                // Remover clases de fullscreen
                iframe.classList.remove('fullscreen-mode');
                contenedor.classList.remove('fullscreen-active');
                
                // Restaurar posición y dimensiones
                iframe.style.position = 'absolute';
                iframe.style.width = anchoBase + 'px';
                iframe.style.height = altoBase + 'px';
                iframe.style.zIndex = '';
                
                // Restaurar contenedor
                contenedor.style.position = 'relative';
                contenedor.style.width = '100%';
                contenedor.style.height = '100vh';
                contenedor.style.zIndex = '';
                
                // Aplicar la escala al iframe
                iframe.style.transform = 'scale(' + escala + ')';
                iframe.style.transformOrigin = 'top left';
                
                // Centrar el iframe en el contenedor
                const nuevoAncho = anchoBase * escala;
                const nuevoAlto = altoBase * escala;
                const posX = (anchoVentana - nuevoAncho) / 2;
                const posY = (altoVentana - nuevoAlto) / 2;
                
                iframe.style.left = posX + 'px';
                iframe.style.top = posY + 'px';
                
                // Remover estilos de escala del contenido del iframe
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    if (iframeDoc) {
                        const scaleStyle = iframeDoc.getElementById('fullscreen-scale-style');
                        if (scaleStyle) {
                            scaleStyle.textContent = '';
                        }
                    }
                } catch(e) {
                    console.log('No se puede acceder al contenido del iframe:', e);
                }
            }
        }
        
        // Función para pantalla completa (solo teclado - botón eliminado)
        function toggleFullscreen() {
            const isFullscreen = document.fullscreenElement || 
                               document.webkitFullscreenElement || 
                               document.mozFullScreenElement ||
                               document.msFullscreenElement;
            
            if (!isFullscreen) {
                const requestFullscreen = document.documentElement.requestFullscreen ||
                                          document.documentElement.webkitRequestFullscreen ||
                                          document.documentElement.mozRequestFullScreen ||
                                          document.documentElement.msRequestFullscreen;
                
                if (requestFullscreen) {
                    requestFullscreen.call(document.documentElement).catch(err => {
                        console.log('Error al entrar en pantalla completa:', err);
                    });
                }
            } else {
                exitFullscreen();
            }
        }
        
        // Función para salir de pantalla completa
        function exitFullscreen() {
            const exitFullscreen = document.exitFullscreen ||
                                   document.webkitExitFullscreen ||
                                   document.mozCancelFullScreen ||
                                   document.msExitFullscreen;
            
            if (exitFullscreen) {
                exitFullscreen.call(document).catch(err => {
                    console.log('Error al salir de pantalla completa:', err);
                });
            }
        }
        
        // Función para cambiar de diapositiva con animación suave
        function cambiar(paso) {
            const anterior = actual;
            actual += paso;
            if (actual < 1) actual = 1;
            if (actual > total) actual = total;
            
            if (anterior !== actual) {
                // Animación de salida
                iframe.style.transition = 'opacity 0.3s ease-in-out';
                iframe.style.opacity = 0;
                
                setTimeout(() => {
                    iframe.src = 'diapositivas/p' + actual + '.html';
                    numTxt.innerText = actual + '/' + total;
                    
                    // Animación de entrada después de cargar
                    iframe.onload = function() {
                        iframe.style.transition = 'opacity 0.4s ease-in-out';
                        iframe.style.opacity = 1;
                    };
                }, 300);
            }
        }
        
        // Control con flechas del teclado
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                cambiar(1);
            }
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                cambiar(-1);
            }
            if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
            if (e.key === 'Escape' && document.fullscreenElement) {
                exitFullscreen();
            }
        });
        
        // Función para salir de pantalla completa
        function exitFullscreen() {
            const exitFullscreen = document.exitFullscreen ||
                                   document.webkitExitFullscreen ||
                                   document.mozCancelFullScreen ||
                                   document.msExitFullscreen;
            
            if (exitFullscreen) {
                exitFullscreen.call(document).catch(err => {
                    console.log('Error al salir de pantalla completa:', err);
                    forceManualFullscreen(false);
                });
            } else {
                forceManualFullscreen(false);
            }
        }
        
        // Eventos de cambio de pantalla completa
        document.addEventListener('fullscreenchange', function() {
            ajustarEscala();
            // Delay adicional para móviles
            setTimeout(ajustarEscala, 200);
            setTimeout(ajustarEscala, 500);
        });
        document.addEventListener('webkitfullscreenchange', function() {
            ajustarEscala();
            setTimeout(ajustarEscala, 200);
            setTimeout(ajustarEscala, 500);
        });
        document.addEventListener('mozfullscreenchange', function() {
            ajustarEscala();
            setTimeout(ajustarEscala, 200);
            setTimeout(ajustarEscala, 500);
        });
        document.addEventListener('MSFullscreenChange', function() {
            ajustarEscala();
            setTimeout(ajustarEscala, 200);
            setTimeout(ajustarEscala, 500);
        });
        
        // Ejecutar en carga y redimensionado
        window.onload = function() {
            ajustarEscala();
            // Ocultar botón de fullscreen en móvil
            if (window.innerWidth <= 768) {
                const fullscreenBtn = document.querySelector('.controls .fullscreen-btn');
                if (fullscreenBtn) {
                    fullscreenBtn.style.display = 'none';
                }
            }
            // Delay adicional para móviles
            setTimeout(ajustarEscala, 100);
            setTimeout(ajustarEscala, 300);
        };
        window.onresize = function() {
            ajustarEscala();
            // Verificar tamaño para mostrar/ocultar botón de fullscreen
            if (window.innerWidth <= 768) {
                const fullscreenBtn = document.querySelector('.controls .fullscreen-btn');
                if (fullscreenBtn) {
                    fullscreenBtn.style.display = 'none';
                }
            }
        };
    </script>
</body>
</html>
