<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SCRUM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        /* Container para centrar el iframe */
        .presenter-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e1a;
        }
        
        /* El iframe con escala y centrado */
        #presentador {
            width: 1280px;
            height: 720px;
            border: none;
            transition: opacity 0.5s, transform 0.3s;
            transform-origin: center center;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
        }
        
        /* Controles minimalistas - casi invisibles */
        .controls {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            align-items: center;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        
        .controls:hover {
            opacity: 1;
        }
        
        button {
            background: rgba(128, 0, 128, 0.4);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        button:hover {
            background: rgba(128, 0, 128, 0.7);
            color: white;
        }
        
        button.fullscreen-btn {
            background: rgba(0, 212, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        button.fullscreen-btn:hover {
            background: rgba(0, 212, 255, 0.5);
            color: white;
        }
        
        #num {
            color: rgba(255, 255, 255, 0.5);
            margin-left: 8px;
            font-weight: 600;
            font-size: 16px;
        }
        
        /* Modo pantalla completa */
        :fullscreen .presenter-container,
        :-webkit-full-screen .presenter-container,
        :-moz-full-screen .presenter-container {
            background: #000;
        }
        
        :fullscreen #presentador,
        :-webkit-full-screen #presentador,
        :-moz-full-screen #presentador {
            width: 100vw;
            height: 100vh;
            transform: none;
        }
        
        /* Ocultar controles en modo pantalla completa */
        :fullscreen .controls,
        :-webkit-full-screen .controls,
        :-moz-full-screen .controls {
            opacity: 0;
        }
        
        :fullscreen .controls:hover,
        :-webkit-full-screen .controls:hover,
        :-moz-full-screen .controls:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="presenter-container">
        <iframe id="presentador" src="diapositivas/p1.html"></iframe>
    </div>

    <div class="controls">
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        <button onclick="cambiar(-1)">◀</button>
        <button onclick="cambiar(1)">▶</button>
        <span id="num">1/14</span>
    </div>

    <script>
        let actual = 1;
        const total = 14;
        const iframe = document.getElementById('presentador');
        const numTxt = document.getElementById('num');
        
        // Ajustar escala del iframe según el tamaño de la pantalla
        function ajustarEscala() {
            const containerWidth = window.innerWidth;
            const containerHeight = window.innerHeight;
            const slideWidth = 1280;
            const slideHeight = 720;
            
            const scaleX = containerWidth / slideWidth;
            const scaleY = containerHeight / slideHeight;
            const scale = Math.min(scaleX, scaleY);
            
            // Solo aplicar escala si no estamos en pantalla completa
            if (!document.fullscreenElement && 
                !document.webkitFullscreenElement && 
                !document.mozFullScreenElement) {
                iframe.style.transform = `scale(${scale})`;
            } else {
                iframe.style.transform = 'none';
            }
        }
        
        function cambiar(paso) {
            actual += paso;
            if (actual < 1) actual = 1;
            if (actual > total) actual = total;
            
            // Cambia la fuente del iframe al siguiente archivo
            iframe.style.opacity = 0;
            setTimeout(() => {
                iframe.src = `diapositivas/p${actual}.html`;
                iframe.style.opacity = 1;
                numTxt.innerText = `${actual}/${total}`;
            }, 300);
        }
        
        // Control con flechas del teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") cambiar(1);
            if (e.key === "ArrowLeft") cambiar(-1);
            if (e.key === "f" || e.key === "F") toggleFullscreen();
            if (e.key === "Escape" && document.fullscreenElement) {
                exitFullscreen();
            }
        });
        
        // Función para activar/desactivar pantalla completa
        function toggleFullscreen() {
            if (!document.fullscreenElement && 
                !document.webkitFullscreenElement && 
                !document.mozFullScreenElement) {
                // Entrar en pantalla completa
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.mozRequestFullScreen) {
                    document.documentElement.mozRequestFullScreen();
                }
            } else {
                // Salir de pantalla completa
                exitFullscreen();
            }
        }
        
        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.mozCancelFullScreen) {
                document.mozCancelFullScreen();
            }
        }
        
        // Escuchar cambios en el modo pantalla completa
        document.addEventListener('fullscreenchange', ajustarEscala);
        document.addEventListener('webkitfullscreenchange', ajustarEscala);
        document.addEventListener('mozfullscreenchange', ajustarEscala);
        
        // Ajustar escala al cargar y al cambiar el tamaño de la ventana
        window.addEventListener('load', ajustarEscala);
        window.addEventListener('resize', ajustarEscala);
    </script>
</body>
</html>
